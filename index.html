<!DOCTYPE html>
<html>
<body>
    <h1>System Diagnostic</h1>
    <div id="output">Attempting to fetch internal flag...</div>
    <script>
        // Try to fetch a common internal flag path
        fetch('/admin/flag')
            .then(response => response.text())
            .then(data => {
                document.getElementById('output').innerText = "Flag Found: " + data;
            })
            .catch(err => {
                document.getElementById('output').innerText = "Access Denied or Not Found";
            });
    </script>
</body>
</html>
