<!DOCTYPE html>
<html>
<head>
    <title>Redirecting</title>
</head>
<body>
    <script>
        // Use the ID from your latest successful API submission
        const id = "69e2a59cbee6d6b7c6629efb";
        const target = "https://bugbounty-exam.hashacademy.co/view.php?id=" + id;

        // Try three different ways to force the bot to move domains
        console.log("Redirecting...");
        
        // 1. Standard replace
        window.location.replace(target);

        // 2. Fallback if replace is blocked
        setTimeout(() => {
            window.location.href = target;
        }, 500);

        // 3. Last resort: Meta Refresh
        setTimeout(() => {
            const meta = document.createElement('meta');
            meta.httpEquiv = "refresh";
            meta.content = "0;url=" + target;
            document.getElementsByTagName('head')[0].appendChild(meta);
        }, 1000);
    </script>
</body>
</html>
